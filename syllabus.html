<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Syllabus | M.J.M.I Elite</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { 
            --primary: #001529; --accent: #C5A059; 
            --bg: #F8FAFB; --white: #ffffff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { height: 100%; margin: 0; }
        body { 
            display: flex; flex-direction: column;
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            overflow-x: hidden; 
        }

        header {
            position: relative; height: 110px; flex-shrink: 0;
            background: url('image1.jpg') center/cover no-repeat; 
            display: flex; align-items: center; justify-content: center; 
            border-bottom: 4px solid var(--accent);
        }
        header::before { content: ''; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.45); }
        .academy-name { 
            position: relative; z-index: 2; font-family: 'Cinzel', serif; 
            font-size: 1.1rem; color: #fff; text-transform: uppercase; letter-spacing: 1.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .home-btn { position: absolute; top: 12px; right: 15px; z-index: 10; color: #fff; text-decoration: none; font-size: 1.2rem; }

        .wrapper { flex: 1 0 auto; width: 100%; max-width: 500px; margin: 0 auto; padding: 15px 12px; }
        
        .portal-grid { display: flex; flex-direction: column; gap: 8px; } /* Minimal gap for sleekness */

        /* Ultra-Sleek VIP Slab Buttons */
        .elite-card { 
            background: var(--white); 
            padding: 14px 20px; 
            text-decoration: none; 
            border-radius: 12px;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: all 0.2s ease;
            border-left: 4px solid var(--accent);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border-right: 1px solid rgba(0,0,0,0.02);
            border-top: 1px solid rgba(0,0,0,0.02);
        }

        /* Haptic Pinch Animation */
        .elite-card:active { 
            transform: scale(0.97); 
            background: #fdfdfd;
            border-color: var(--primary);
        }

        .card-label { 
            color: var(--primary); 
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            letter-spacing: 0.8px; 
        }

        .arrow-indicator { 
            color: var(--accent); 
            font-size: 0.9rem; 
            opacity: 0.6;
            font-weight: 900;
        }

        footer { 
            flex-shrink: 0;
            background: var(--primary); padding: 45px 20px; 
            text-align: center; color: #fff; border-top: 5px solid var(--accent); 
            margin-top: 20px;
        }
    </style>
</head>
