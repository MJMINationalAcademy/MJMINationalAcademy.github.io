<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllabus Repo | M.J.M.I National Academy</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #001529; --accent: #C5A059; --bg-body: #F4F7F6; --white: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-body); overflow-x: hidden; }

        header {
            background: linear-gradient(rgba(0, 21, 41, 0.4), rgba(0, 21, 41, 0.4)), url('image1.jpg');
            background-size: cover; background-position: center; padding: 45px 5%; 
            border-bottom: 5px solid var(--accent); display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap;
        }
        .academy-logo { width: 85px; height: 85px; border-radius: 15px; border: 3px solid var(--accent); cursor: pointer; }
        .header-text-container { text-align: left; }
        .academy-name { font-family: 'Cinzel', serif; font-size: clamp(1.2rem, 4.5vw, 2.5rem); margin: 0; color: var(--white); text-transform: uppercase; line-height: 1.2; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }
        .sub-address { color: var(--accent); font-size: 0.8rem; letter-spacing: 2px; font-weight: 700; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }

        @media (max-width: 768px) {
            header { flex-direction: column; text-align: center; padding: 35px 10px; }
            .header-text-container { text-align: center; }
            .academy-name { font-size: 1.1rem; white-space: normal; }
        }

        .wrapper { max-width: 1000px; margin: 30px auto; padding: 0 15px; }
        
        .portal-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
        }

        .elite-card { 
            background: var(--white); 
            padding: 35px 10px; 
            text-decoration: none; 
            border: 1px solid #eee; 
            border-bottom: 5px solid var(--accent); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            transition: all 0.3s ease; 
            border-radius: 20px; 
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .elite-card:active { transform: scale(0.95); background: #f0f0f0; }
        
        .card-label { 
            color: var(--primary); 
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 0.85rem; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html"><img src="image2.jpg" alt="Logo" class="academy-logo"></a>
    <div class="header-text-container">
        <h1 class="academy-name">M.J.M.I National Academy</h1>
        <div class="sub-address">Sathla • Mawana • Meerut</div>
    </div>
</header>

<div class="wrapper">
    <div class="portal-grid">
        <a href="https://google.com" target="_blank" class="elite-card"><div class="card-label">Nursery</div></a>
        <a href="https://google.com" target="_blank" class="elite-card"><div class="card-label">L.K.G</div></a>
        <a href="https://google.com" target="_blank" class="elite-card"><div class="card-label">U.K.G</div></a>
        <a href="https://google.com" target="_blank" class="elite-card"><div class="card-label">Class I</div></a>
        <a href="https://google.com" target="_blank" class="elite-card"><div class="card-label">Class II</div></a>
        <a href="https://google.com" target="_blank" class="elite-card"><div class="card-label">Class III</div></a>
        <a href="https://google.com" target="_blank" class="elite-card"><div class="card-label">Class IV</div></a>
        <a href="https://google.com" target="_blank" class="elite-card"><div class="card-label">Class V</div></a>
        <a href="https://google.com" target="_blank" class="elite-card"><div class="card-label">Class VI</div></a>
        <a href="https://google.com" target="_blank" class="elite-card"><div class="card-label">Class VII</div></a>
        <a href="https://google.com" target="_blank" class="elite-card"><div class="card-label">Class VIII</div></a>
        <a href="https://google.com" target="_blank" class="elite-card"><div class="card-label">Class IX</div></a>
        <!-- NEW CLASS X BUTTON -->
        <a href="https://google.com" target="_blank" class="elite-card"><div class="card-label">Class X</div></a>
    </div>
</div>

</body>
</html>
