<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.J.M.I National Academy | Portal</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #001529; --accent: #C5A059; --bg-body: #F4F7F6; --white: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-body); overflow-x: hidden; }

        header {
            background: linear-gradient(rgba(0, 21, 41, 0.4), rgba(0, 21, 41, 0.4)), url('image1.jpg');
            background-size: cover; background-position: center; padding: 45px 5%; 
            border-bottom: 5px solid var(--accent); display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap;
        }
        .academy-logo { width: 85px; height: 85px; border-radius: 15px; border: 3px solid var(--accent); cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .header-text-container { text-align: left; }
        .academy-name { font-family: 'Cinzel', serif; font-size: clamp(1.2rem, 4.5vw, 2.5rem); margin: 0; color: var(--white); text-transform: uppercase; line-height: 1.2; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }
        .sub-address { color: var(--accent); font-size: 0.8rem; letter-spacing: 2px; font-weight: 700; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }

        @media (max-width: 768px) {
            header { flex-direction: column; text-align: center; padding: 35px 10px; }
            .header-text-container { text-align: center; }
            .academy-name { font-size: 1.1rem; white-space: normal; }
        }

        .sticky-nav { position: sticky; top: 0; background: white; z-index: 1000; border-bottom: 1px solid #ddd; padding: 12px 5%; }
        .search-box-container { width: 100%; position: relative; }
        .elite-search { width: 100%; padding: 12px 15px 12px 40px; border-radius: 12px; border: 1px solid #eee; background: #f9f9f9; outline: none; font-size: 0.9rem; }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); opacity: 0.4; }

        .wrapper { max-width: 1200px; margin: 25px auto; padding: 0 15px; }
        .portal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
        
        @media (max-width: 480px) {
            .portal-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }

        .elite-card { 
            background: var(--white); padding: 30px 15px; text-decoration: none; 
            border: 1px solid #eee; border-bottom: 4px solid #e0e0e0; 
            display: flex; flex-direction: column; align-items: center; 
            transition: all 0.2s ease; border-radius: 18px; text-align: center;
        }
        .elite-card:active { transform: scale(0.95); background: #f0f0f0; }
        .card-glyph { font-size: 2.2rem; margin-bottom: 10px; }
        .card-label { color: var(--primary); font-weight: 700; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.3px; line-height: 1.2; }

        #passModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 30px; border-radius: 20px; text-align: center; border-top: 6px solid var(--accent); width: 90%; max-width: 350px; }
        .modal-box input { padding: 15px; width: 100%; max-width: 180px; font-size: 1.8rem; text-align: center; letter-spacing: 8px; border: 2px solid #eee; margin: 20px 0; border-radius: 10px; outline: none; }
        .modal-box button { background: var(--primary); color: var(--accent); padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="passModal">
    <div class="modal-box">
        <h3 id="modalTitle" style="margin:0; font-family:'Cinzel', serif;">Security Access</h3>
        <p id="modalDesc" style="font-size: 0.8rem; color: #666; margin-top: 5px;">Authorization Required</p>
        <input type="password" id="passInput" maxlength="4" autofocus> <br>
        <button onclick="verifyAccess()">Unlock Now</button>
        <button onclick="closeModal()" style="background:#f4f4f4; color:#666; margin-top:10px; font-size: 0.75rem; border:none; padding:10px; border-radius:8px; width:100%;">Cancel</button>
    </div>
</div>

<header>
    <img src="image2.jpg" alt="Logo" class="academy-logo" onclick="masterLoginTrigger()">
    <div class="header-text-container">
        <h1 class="academy-name">M.J.M.I National Academy</h1>
        <div class="sub-address">Sathla • Mawana • Meerut</div>
    </div>
</header>

<div class="sticky-nav">
    <div class="search-box-container">
        <span class="search-icon">🔍</span>
        <input type="text" id="siteSearch" class="elite-search" placeholder="Search..." onkeyup="filterContent()">
    </div>
</div>

<div class="wrapper">
    <!-- MAIN DASHBOARD (Linked to External Files) -->
    <div id="main-dashboard" class="portal-grid">
        <a href="https://google.com" target="_blank" class="elite-card">
            <div class="card-glyph">🏛️</div><div class="card-label">Admission Form</div>
        </a>
        
        <!-- Link to syllabus.html -->
        <a href="syllabus.html" class="elite-card">
            <div class="card-glyph">📜</div><div class="card-label">Syllabus</div>
        </a>
        
        <a href="https://google.com" target="_blank" class="elite-card">
            <div class="card-glyph">🖊️</div><div class="card-label">Exams</div>
        </a>
        
        <a href="https://google.com" target="_blank" class="elite-card">
            <div class="card-glyph">📖</div><div class="card-label">Library</div>
        </a>
        
        <a href="https://google.com" target="_blank" class="elite-card">
            <div class="card-glyph">📊</div><div class="card-label">Results</div>
        </a>
        
        <a href="https://google.com" target="_blank" class="elite-card">
            <div class="card-glyph">🗓️</div><div class="card-label">Time Table</div>
        </a>
        
        <a href="https://google.com" target="_blank" class="elite-card">
            <div class="card-glyph">💡</div><div class="card-label">Skill Lab</div>
        </a>
        
        <!-- Link to camp.html -->
        <a href="camp.html" class="elite-card">
            <div class="card-glyph">🌳</div><div class="card-label">Camp</div>
        </a>
    </div>
</div>
<footer style="background: var(--primary); padding: 40px 20px; text-align: center; color: var(--white); border-top: 5px solid var(--accent); margin-top: 50px;">
    <div style="font-family: 'Cinzel', serif; font-size: clamp(1rem, 4vw, 1.5rem); margin-bottom: 8px; color: var(--accent);">M.J.M.I National Academy</div>
    <div style="font-size: 0.8rem; opacity: 0.7; letter-spacing: 1px;">Sathla, Mawana, Meerut • © 2026</div>
</footer>

<script src="config.js"></script>
<script>
    let activeAuth = null;

    function masterLoginTrigger() {
        activeAuth = { type: 'MASTER', pass: CONFIG.master_key };
        document.getElementById('modalTitle').innerText = "Admin Portal";
        openModal();
    }

    function openModal() { 
        document.getElementById('passModal').style.display = 'flex'; 
        document.getElementById('passInput').focus(); 
    }
    
    function closeModal() { 
        document.getElementById('passModal').style.display = 'none'; 
        document.getElementById('passInput').value = ''; 
    }

    function verifyAccess() {
        const input = document.getElementById('passInput').value;
        if (activeAuth.type === 'MASTER') {
            if (input === CONFIG.master_key) { 
                alert("🔓 Master Access Granted"); 
                closeModal(); 
            } else { 
                alert("Wrong Key"); 
                document.getElementById('passInput').value = ''; 
            }
        }
    }

    function filterContent() {
        const q = document.getElementById('siteSearch').value.toLowerCase();
        const activeGrid = document.querySelector('.portal-grid');
        Array.from(activeGrid.getElementsByClassName('elite-card')).forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(q) ? "flex" : "none";
        });
    }
</script>
</body>
</html>
