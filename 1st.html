<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.J.M.I National Academy - Assignment</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #eef2f3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            background-color: white;
        }

        .fs-button {
            margin-top: 30px;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffffff;
            background: linear-gradient(135deg, #007bff, #0056b3);
            border: none;
            border-radius: 50px;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,123,255,0.3);
            transition: transform 0.2s;
        }

        .fs-button:active {
            transform: scale(0.98);
        }

        /* फुल स्क्रीन सेटिंग */
        :-webkit-full-screen img {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background-color: #000;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color: #333;">Vacation Assignment</h2>
        
        <!-- आपकी इमेज -->
        <img id="assignmentImg" src="1st.png" alt="Summer Vacation Assignment">

        <!-- लैंडस्केप बटन -->
        <button class="fs-button" onclick="goFullScreen()">Full Screen Mode</button>
    </div>

    <script>
        function goFullScreen() {
            const img = document.getElementById("assignmentImg");

            // फुल स्क्रीन रिक्वेस्ट
            if (img.requestFullscreen) {
                img.requestFullscreen();
            } else if (img.webkitRequestFullscreen) {
                img.webkitRequestFullscreen();
            }

            // लैंडस्केप मोड में घुमाना (Android/Chrome के लिए)
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(err => {
                    console.log("Orientation lock not supported");
                });
            }
        }
    </script>

</body>
</html>
