<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10.0, user-scalable=yes">
    <title>Landscape Assignment Viewer</title>
    <style>
        /* बेसिक पेज सेटअप */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* पेज स्क्रॉल बंद */
        }

        /* इमेज कंटेनर जो ज़ूम को संभालेगा */
        .zoom-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto; /* ज़ूम होने पर स्क्रॉल करने के लिए */
        }

        #assignmentImg {
            max-width: 90%;
            max-height: 90%;
            transition: transform 0.1s ease;
            display: block;
        }

        /* छोटा फ्लोटिंग बटन (कौने में) */
        .fs-icon-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(0, 123, 255, 0.85);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 24px;
            cursor: pointer;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* फुल स्क्रीन मोड के लिए स्पेसिफिक स्टाइल */
        :fullscreen #assignmentImg {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }
        
        :-webkit-full-screen #assignmentImg {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="zoom-container">
        <img id="assignmentImg" src="Nursery.png" alt="Assignment">
    </div>

    <!-- छोटा बटन कौने में -->
    <button class="fs-icon-btn" onclick="startImmersiveMode()">
        ⛶
    </button>

    <script>
        async function startImmersiveMode() {
            const docElm = document.documentElement;

            try {
                // 1. फुल स्क्रीन रिक्वेस्ट करना
                if (docElm.requestFullscreen) {
                    await docElm.requestFullscreen();
                } else if (docElm.webkitRequestFullscreen) {
                    await docElm.webkitRequestFullscreen();
                }

                // 2. लैंडस्केप मोड को 'Force' लॉक करना
                // यह यूजर को फोन सीधा करने पर भी पोर्ट्रेट में जाने नहीं देगा
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                } else if (screen.lockOrientation) {
                    screen.lockOrientation('landscape');
                }
            } catch (err) {
                console.error("Landscape Lock Error: ", err);
                alert("Landscape lock के लिए कृपया Chrome ब्राउज़र का उपयोग करें।");
            }
        }

        // मोबाइल पर पिंच ज़ूम को बेहतर बनाने के लिए बेसिक टच इवेंट्स (Browser default handling)
        // नोट: ज्यादातर आधुनिक मोबाइल ब्राउज़र फुल स्क्रीन में पिंच-ज़ूम को ऑटोमैटिक सपोर्ट करते हैं।
    </script>

</body>
</html>
