<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landscape Assignment Viewer</title>
    <!-- ज़ूम के लिए लाइब्रेरी -->
    <script src="https://unpkg.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f4f4f9;
            font-family: sans-serif;
            overflow: hidden; /* बाहर स्क्रॉल बंद */
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        /* ज़ूम के लिए जरूरी रैपर */
        .pinch-zoom-wrapper {
            width: 100%;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            background: white;
        }

        #assignmentImg {
            width: 100%;
            display: block;
        }

        /* पुराना बड़ा बटन स्टाइल */
        .fs-button {
            margin-top: 25px;
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 10px;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* फुल स्क्रीन के अंदर की सेटिंग */
        :fullscreen .pinch-zoom-wrapper {
            width: 100vw;
            height: 100vh;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        :fullscreen #assignmentImg {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="zoomElement" class="pinch-zoom-wrapper">
            <img id="assignmentImg" src="Nursery.png" alt="Assignment">
        </div>

        <!-- आपका पुराना बड़ा बटन -->
        <button class="fs-button" onclick="goLandscapeFull()">Full Screen (Landscape)</button>
    </div>

    <script>
        // ज़ूम इंजन सेटअप (यह फुल स्क्रीन में भी काम करेगा)
        const el = document.querySelector('#zoomElement');
        const pz = new PinchZoom(el, {
            draggableUnzoomed: false,
            minZoom: 1,
            maxZoom: 5
        });

        async function goLandscapeFull() {
            const container = document.documentElement; // पूरी स्क्रीन को फुल करना

            try {
                // 1. फुल स्क्रीन एक्टिवेट करना
                if (container.requestFullscreen) {
                    await container.requestFullscreen();
                } else if (container.webkitRequestFullscreen) {
                    await container.webkitRequestFullscreen();
                }

                // 2. लैंडस्केप मोड लॉक करना
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch (err) {
                console.warn("Landscape lock not supported on this device.");
            }
        }

        // फुल स्क्रीन से बाहर आने पर ओरिएंटेशन अनलॉक करना (Optional)
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && screen.orientation && screen.orientation.unlock) {
                screen.orientation.unlock();
            }
        });
    </script>

</body>
</html>
